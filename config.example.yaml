app:
  name: "Echo"
  mode: "release"
  port: 8080

log:
  level: "debug"
  filename: "cacheline.log"
  max_size: 200
  max_age: 30
  max_backups: 7

mysql:
  host: "127.0.0.1"
  port: 3306 
  user: "" //youruser
  password: "" //yourpassword
  dbname: ""
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 3600

redis:
  host: "127.0.0.1"
  port: 6379  
  password: ""
  db: 0
  pool_size: 100

snowflake:
  start_time: "2026-01-01"
  machine_id: 1

auth:
  jwt_secret: "cacheline_is_awesome_secret_key"
  jwt_expire: 2  
